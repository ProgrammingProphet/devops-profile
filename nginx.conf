# for nginx http server
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ =404;
    }
    location /images/ {
        alias /usr/share/nginx/html/images/;
    }
    location /css/ {
        alias /usr/share/nginx/html/css/;
    }
    location /js/ {
        alias /usr/share/nginx/html/js/;
    }
}

