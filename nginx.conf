# -----------------------------
# HTTP SERVER (Port 80)
# -----------------------------
server {
    listen 80;
    server_name programmingprophet.site www.programmingprophet.site;

    # ✅ Certbot challenge (CRITICAL)
    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
    }

    # ✅ Your website
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ❗ Enable this AFTER SSL works
    # return 301 https://$host$request_uri;
}


-----------------------------
HTTPS SERVER (Port 443)
-----------------------------
server {
    listen 443 ssl;
    server_name programmingprophet.site www.programmingprophet.site;

    # ✅ SSL certs (Certbot will generate these)
    ssl_certificate /etc/letsencrypt/live/programmingprophet.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/programmingprophet.site/privkey.pem;

    # ✅ Recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ✅ Website
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}