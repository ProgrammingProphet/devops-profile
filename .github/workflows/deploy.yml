name: Deploy Portfolio to VM

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t programmingprobhet/profile:latest .

    - name: Login to Docker Hub
      run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

    - name: Push image
      run: docker push programmingprobhet/profile:latest

deploy:
  runs-on: ubuntu-latest
  needs: build

  steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
        with:
        host: ${{ secrets.ORACLE_VM_IP }}
        username: ubuntu
        key: ${{ secrets.ORACLE_VM_SSH_KEY }}
        script: |
          cd ~/devops-profile

          echo "Pull latest image"
          docker pull programmingprobhet/profile:latest

          echo "Stop old container (graceful)"
          docker stop portfolio || true

          echo "Remove old container"
          docker rm portfolio || true

          echo "Start new container"
          docker run -d \
          -p 80:80 \
          -p 443:443 \
          -v ~/certbot/www:/var/www/certbot \
          -v ~/certbot/conf:/etc/letsencrypt \
          --name portfolio \
          programmingprobhet/profile:latest

          echo "Health check"
          sleep 5
          curl -f http://localhost || exit 1

          echo "Deployment successful"

# Add GitHub Secrets 
# In GitHub repo → Settings → Secrets → Actions
# Add:
# ORACLE_VM_IP → Oracle VM IP
# ORACLE_VM_SSH_KEY → Oracle VM SSH key content
