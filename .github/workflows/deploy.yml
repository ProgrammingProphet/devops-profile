name: Build Image + Deploy Portfolio to Server

on:
  push:
    branches: [main]



jobs:
  # Build and push Docker image to Docker Hub
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t programmingprobhet/profile:v1 .

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image to Docker Hub
        run: docker push programmingprobhet/profile:v1
      
  # Deploy the static portfolio website to Oracle Cloud (Nginx)
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Oracle VM Instance
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ubuntu
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            cd ~/devops-profile
            git pull origin main

            echo "Pull latest image" 
            docker pull programmingprobhet/profile:v1 
            
            echo "Stop old container (graceful)" 
            docker stop portfolio || true 
            
            echo "Remove old container" 
            docker rm portfolio || true

            echo "Start new container" 
            docker run -d -p 80:80 -p 443:443 -v ~/certbot/www:/var/www/certbot -v ~/certbot/conf:/etc/letsencrypt --name portfolio programmingprobhet/profile:v1

            echo "Health check" 
            sleep 5 
            curl -f https://programmingprophet.site || exit 1 
            
            echo "Deployment successful"
            
  
# Add GitHub Secrets 
# In GitHub repo → Settings → Secrets → Actions
# Add:
# ORACLE_VM_IP → Oracle VM IP
# ORACLE_VM_SSH_KEY → Oracle VM SSH key content
